name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: monitor/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install monitor dependencies
        run: cd monitor && npm ci

      - name: Install Playwright browsers
        run: cd monitor && npx playwright install chromium --with-deps

      - name: Run unit tests
        run: node --test tests/*.test.js

      - name: Run Playwright tests
        run: cd monitor && npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: monitor/playwright-report/
          retention-days: 14
